<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treino — Planner</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</head>
<body>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="profile.html">Perfil</a>
    <a href="diet.html">Dieta</a>
    <a href="workout.html" class="active">Treino</a>
    <a href="history.html">Histórico</a>
    <a href="#" onclick="logout()" style="margin-left:auto;color:var(--muted)">Sair</a>
  </nav>
  <div class="container">
    <h1>Gerar Plano de Treino</h1>
    <div class="card" style="background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.3)">
      <p style="color:#fbbf24;font-size:0.85rem">⚠️ <strong>Aviso:</strong> Este plano é gerado por IA para uso pessoal e informativo. Consulte um profissional de educação física antes de iniciar um novo programa de treino.</p>
    </div>
    <div class="card">
      <div class="grid-2">
        <div>
          <label>Dias de treino por semana</label>
          <select id="days_per_week">
            <option value="2">2 dias</option>
            <option value="3">3 dias</option>
            <option value="4" selected>4 dias</option>
            <option value="5">5 dias</option>
          </select>
        </div>
        <div>
          <label>Foco (opcional)</label>
          <input type="text" id="focus" placeholder="ex: hipertrofia, força, cardio (vazio = usa seu objetivo)">
        </div>
      </div>
      <button id="generateBtn">Gerar Treino com Claude + ExerciseDB</button>
      <p id="status"></p>
    </div>
    <div id="result" style="display:none" class="card">
      <h2 style="margin-bottom:1rem">Plano Gerado</h2>
      <div id="planContent" class="prose"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="api.js"></script>
  <script>
    requireAuth().then(() => {
      document.getElementById("generateBtn").addEventListener("click", async () => {
        const btn = document.getElementById("generateBtn");
        const status = document.getElementById("status");
        btn.disabled = true;
        status.textContent = "Iniciando geração... ⏳";
        status.className = "loading";
        document.getElementById("result").style.display = "none";
        try {
          const headers = { "Content-Type": "application/json", ...(await getAuthHeaders()) };
          const res = await fetch("/workout/generate", {
            method: "POST",
            headers,
            body: JSON.stringify({
              days_per_week: parseInt(document.getElementById("days_per_week").value),
              focus: document.getElementById("focus").value,
            }),
          });
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();
            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              const msg = JSON.parse(line.slice(6));
              if (msg.type === "status") {
                status.textContent = msg.message;
                status.className = "loading";
              } else if (msg.type === "saved") {
                document.getElementById("planContent").innerHTML = marked.parse(msg.content);
                document.getElementById("result").style.display = "block";
                status.textContent = `Plano gerado! Foco: ${msg.focus}`;
                status.className = "msg-success";
              } else if (msg.type === "error") {
                throw new Error(msg.message);
              }
            }
          }
        } catch (err) {
          status.textContent = err.message;
          status.className = "msg-error";
        } finally {
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
