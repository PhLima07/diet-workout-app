<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Planner</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</head>
<body>
  <div class="container" style="max-width:400px;margin-top:4rem">
    <h1>Diet & Workout Planner</h1>
    <div class="card">
      <h2 style="margin-bottom:1.5rem">Entrar</h2>
      <form id="loginForm">
        <label>Email</label>
        <input type="email" id="email" required placeholder="seu@email.com">
        <label>Senha</label>
        <input type="password" id="password" required placeholder="••••••••">
        <button type="submit" id="loginBtn">Entrar</button>
        <p id="msg"></p>
      </form>
      <p style="margin-top:1rem;font-size:0.875rem;color:var(--muted)">
        Não tem conta? <a href="register.html" style="color:var(--primary)">Criar conta →</a>
      </p>
    </div>
  </div>
  <script>
    getSession().then(s => { if (s) window.location.href = "/index.html"; });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("loginBtn");
      const msg = document.getElementById("msg");
      btn.disabled = true;
      msg.textContent = "";
      try {
        const { error } = await _sb.auth.signInWithPassword({
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        });
        if (error) throw error;
        window.location.href = "/index.html";
      } catch (err) {
        msg.textContent = err.message;
        msg.className = "msg-error";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
