<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dieta — Planner</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</head>
<body>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="profile.html">Perfil</a>
    <a href="diet.html" class="active">Dieta</a>
    <a href="workout.html">Treino</a>
    <a href="history.html">Histórico</a>
    <a href="#" onclick="logout()" style="margin-left:auto;color:var(--muted)">Sair</a>
  </nav>
  <div class="container">
    <h1>Gerar Plano de Dieta</h1>
    <div class="card" style="background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.3)">
      <p style="color:#fbbf24;font-size:0.85rem">⚠️ <strong>Aviso:</strong> Este plano é gerado por IA para uso pessoal e informativo. Consulte um nutricionista antes de fazer mudanças significativas na sua alimentação.</p>
    </div>
    <div class="card">
      <div class="grid-2">
        <div>
          <label>Duração do plano</label>
          <select id="days">
            <option value="3">3 dias</option>
            <option value="7" selected>7 dias</option>
            <option value="14">14 dias</option>
          </select>
        </div>
        <div>
          <label>Refeições por dia</label>
          <select id="meals_per_day">
            <option value="3">3 refeições</option>
            <option value="4" selected>4 refeições</option>
            <option value="5">5 refeições</option>
            <option value="6">6 refeições</option>
          </select>
        </div>
      </div>
      <button id="generateBtn">Gerar Dieta com Claude + USDA</button>
      <p id="status"></p>
    </div>
    <div id="result" style="display:none" class="card">
      <h2 style="margin-bottom:1rem">Plano Gerado</h2>
      <div id="planContent" class="prose"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="api.js"></script>
  <script>
    requireAuth().then(() => {
      document.getElementById("generateBtn").addEventListener("click", async () => {
        const btn = document.getElementById("generateBtn");
        const status = document.getElementById("status");
        btn.disabled = true;
        status.textContent = "Iniciando geração... ⏳";
        status.className = "loading";
        document.getElementById("result").style.display = "none";
        try {
          const headers = { "Content-Type": "application/json", ...(await getAuthHeaders()) };
          const res = await fetch("/diet/generate", {
            method: "POST",
            headers,
            body: JSON.stringify({
              days: parseInt(document.getElementById("days").value),
              meals_per_day: parseInt(document.getElementById("meals_per_day").value),
            }),
          });
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();
            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              const msg = JSON.parse(line.slice(6));
              if (msg.type === "status") {
                status.textContent = msg.message;
                status.className = "loading";
              } else if (msg.type === "saved") {
                document.getElementById("planContent").innerHTML = marked.parse(msg.content);
                document.getElementById("result").style.display = "block";
                status.textContent = `Plano gerado! Meta: ${msg.calories_target} kcal/dia`;
                status.className = "msg-success";
              } else if (msg.type === "error") {
                throw new Error(msg.message);
              }
            }
          }
        } catch (err) {
          status.textContent = err.message;
          status.className = "msg-error";
        } finally {
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
